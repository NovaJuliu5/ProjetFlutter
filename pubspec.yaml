name: help_neighbor
description: Application d'entraide de voisinage (version locale)
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.6
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  go_router: ^12.0.0
  dio: ^5.3.2
  logger: ^1.4.0
  json_annotation: ^4.8.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  geolocator: ^10.1.0
  # file_picker: (supprimé) – non utilisé
  # image_picker: (optionnel, gardé si besoin)
  cached_network_image: ^3.3.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  get_it: ^7.6.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    # Commentez temporairement les dossiers manquants
    # - actifs/images/
    # - actifs/polices/
    # - actifs/animations/
    - actifs/traductions/